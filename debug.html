<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug - PT PMP</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; font-size: 14px; }
    h2 { color: #166534; }
    .test { padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; }
    .ok { background: #f0fdf4; border-color: #16a34a; }
    .fail { background: #fef2f2; border-color: #cc2229; }
    .wait { background: #fefce8; border-color: #c9932a; }
    button { padding: 10px 20px; background: #166534; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 4px; }
    button:disabled { background: #999; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
    #log { margin-top: 20px; }
  </style>
</head>
<body>
  <h2>PT PMP — Debug Supabase</h2>
  <p>Halaman ini mengecek koneksi Supabase, tabel, dan Storage.</p>

  <div id="results"></div>

  <button onclick="runAllTests()">Jalankan Semua Test</button>
  <button onclick="testUploadImage()">Test Upload Gambar</button>

  <div id="log"><h3>Log:</h3></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    var SUPA_URL = 'https://hlpulsseqeqcfzqsoypg.supabase.co';
    var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhscHVsc3NlcWVxY2Z6cXNveXBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDU5NTksImV4cCI6MjA4ODgyMTk1OX0.Uu7ZxtdZF3cuyQAiN45zxjKA9nw6FeebJpny6OAGqxA';
    var sb = null;

    function log(msg, type) {
      var el = document.getElementById('log');
      var div = document.createElement('div');
      div.className = 'test ' + (type || '');
      div.textContent = msg;
      el.appendChild(div);
    }

    function addResult(name, ok, detail) {
      var el = document.getElementById('results');
      var div = document.createElement('div');
      div.className = 'test ' + (ok ? 'ok' : 'fail');
      div.innerHTML = '<strong>' + (ok ? '✅' : '❌') + ' ' + name + '</strong><br>' + (detail || '');
      el.appendChild(div);
    }

    async function runAllTests() {
      document.getElementById('results').innerHTML = '';
      document.getElementById('log').innerHTML = '<h3>Log:</h3>';

      // 1. Supabase client
      log('Membuat Supabase client...', 'wait');
      try {
        sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
        addResult('Supabase Client', true, 'Client berhasil dibuat');
      } catch(e) {
        addResult('Supabase Client', false, e.message);
        return;
      }

      // 2. Test tabel harga
      log('Test tabel harga...');
      try {
        var r = await sb.from('harga').select('*').eq('id', 'main').single();
        if (r.error) {
          addResult('Tabel harga', false, 'Error: ' + r.error.message + ' (code: ' + r.error.code + ')');
        } else {
          addResult('Tabel harga', true, 'Data ada. Keys: ' + Object.keys(r.data).join(', '));
        }
      } catch(e) { addResult('Tabel harga', false, e.message); }

      // 3. Test tabel kontak
      log('Test tabel kontak...');
      try {
        var r = await sb.from('kontak').select('*').eq('id', 'main').single();
        if (r.error && r.error.code !== 'PGRST116') {
          addResult('Tabel kontak', false, 'Error: ' + r.error.message);
        } else {
          addResult('Tabel kontak', true, r.data ? 'Data ada' : 'Tabel ada tapi kosong (OK, akan di-seed)');
        }
      } catch(e) { addResult('Tabel kontak', false, e.message); }

      // 4. Test tabel photos
      log('Test tabel photos...');
      try {
        var r = await sb.from('photos').select('id', { count: 'exact', head: true });
        if (r.error) {
          addResult('Tabel photos', false, 'Error: ' + r.error.message);
        } else {
          addResult('Tabel photos', true, 'Total foto: ' + (r.count || 0));
        }
      } catch(e) { addResult('Tabel photos', false, e.message); }

      // 5. Test tabel news_data (BARU)
      log('Test tabel news_data...');
      try {
        var r = await sb.from('news_data').select('*').eq('id', 'main').single();
        if (r.error) {
          if (r.error.code === 'PGRST116') {
            addResult('Tabel news_data', true, 'Tabel ada tapi kosong (OK, akan di-seed otomatis)');
          } else if (r.error.message.indexOf('does not exist') !== -1 || r.error.code === '42P01') {
            addResult('Tabel news_data', false, 'TABEL BELUM DIBUAT! Jalankan SQL di Supabase Dashboard.');
          } else {
            addResult('Tabel news_data', false, 'Error: ' + r.error.message + ' (code: ' + r.error.code + ')');
          }
        } else {
          var articles = r.data.data;
          if (Array.isArray(articles)) {
            var withThumb = articles.filter(function(a) { return a.thumbnail && a.thumbnail.length > 0; }).length;
            addResult('Tabel news_data', true, 'Artikel: ' + articles.length + ', Dengan thumbnail: ' + withThumb);
            // Show thumbnail URLs
            articles.forEach(function(a) {
              if (a.thumbnail) {
                log('Artikel "' + a.title_id.substring(0, 40) + '..." thumbnail: ' + a.thumbnail.substring(0, 100) + (a.thumbnail.length > 100 ? '...' : ''), 'ok');
              }
            });
          } else {
            addResult('Tabel news_data', false, 'Data bukan array: ' + typeof articles);
          }
        }
      } catch(e) { addResult('Tabel news_data', false, e.message); }

      // 6. Test tabel articles (LAMA — cek apakah masih dipakai)
      log('Test tabel articles (lama)...');
      try {
        var r = await sb.from('articles').select('id, thumbnail', { count: 'exact' });
        if (r.error) {
          log('Tabel articles lama: ' + r.error.message, 'wait');
        } else {
          log('Tabel articles lama masih ada: ' + (r.data || []).length + ' rows. Thumbnails: ' + (r.data || []).filter(function(a) { return a.thumbnail; }).length, 'wait');
        }
      } catch(e) {}

      // 7. Test Storage bucket gallery
      log('Test Storage bucket gallery...');
      try {
        var r = await sb.storage.from('gallery').list('', { limit: 5 });
        if (r.error) {
          addResult('Storage bucket gallery', false, 'Error: ' + r.error.message);
        } else {
          var folders = (r.data || []).map(function(f) { return f.name; });
          addResult('Storage bucket gallery', true, 'Bucket ada! Isi: ' + (folders.length > 0 ? folders.join(', ') : '(kosong)'));
        }
      } catch(e) { addResult('Storage bucket gallery', false, e.message); }

      // 8. Test upload kecil ke Storage
      log('Test upload file kecil ke Storage...');
      try {
        var testBlob = new Blob(['test-' + Date.now()], { type: 'text/plain' });
        var testName = 'test/debug-' + Date.now() + '.txt';
        var r = await sb.storage.from('gallery').upload(testName, testBlob, { contentType: 'text/plain', upsert: false });
        if (r.error) {
          addResult('Storage Upload', false, 'Upload gagal: ' + r.error.message);
        } else {
          addResult('Storage Upload', true, 'Upload berhasil! Path: ' + testName);
          // Clean up
          await sb.storage.from('gallery').remove([testName]);
          log('Test file dihapus', 'ok');
        }
      } catch(e) { addResult('Storage Upload', false, e.message); }

      // 9. Test write ke news_data
      log('Test write ke news_data...');
      try {
        var testArticles = [{ id: 'test-debug', title_id: 'Debug Test', title_en: '', body_id: '<p>test</p>', body_en: '', date: '2025-01-01', category: 'company', thumbnail: 'https://example.com/test.jpg' }];
        var r = await sb.from('news_data').upsert({ id: 'debug-test', data: testArticles, updated_at: new Date().toISOString() });
        if (r.error) {
          addResult('Write news_data', false, 'Write gagal: ' + r.error.message);
        } else {
          // Read back
          var r2 = await sb.from('news_data').select('*').eq('id', 'debug-test').single();
          if (r2.data && r2.data.data && r2.data.data[0].thumbnail === 'https://example.com/test.jpg') {
            addResult('Write news_data', true, 'Write + Read OK! Thumbnail URL tersimpan dengan benar.');
          } else {
            addResult('Write news_data', false, 'Write OK tapi read gagal. Data: ' + JSON.stringify(r2.data));
          }
          // Clean up
          await sb.from('news_data').delete().eq('id', 'debug-test');
        }
      } catch(e) { addResult('Write news_data', false, e.message); }

      log('=== Semua test selesai ===', 'ok');
    }

    async function testUploadImage() {
      document.getElementById('log').innerHTML += '<div class="test wait"><strong>Test Upload Gambar</strong></div>';

      if (!sb) sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

      // Create a small test image (1x1 red pixel JPEG)
      var canvas = document.createElement('canvas');
      canvas.width = 100; canvas.height = 100;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#cc2229'; ctx.fillRect(0, 0, 100, 100);
      ctx.fillStyle = '#ffffff'; ctx.font = '14px sans-serif'; ctx.fillText('TEST', 30, 55);

      canvas.toBlob(async function(blob) {
        var fileName = 'thumbnails/test-' + Date.now() + '.jpg';
        log('Uploading test image (' + blob.size + ' bytes) to gallery/' + fileName + '...', 'wait');

        try {
          var r = await sb.storage.from('gallery').upload(fileName, blob, {
            cacheControl: '3600', upsert: false, contentType: 'image/jpeg'
          });

          if (r.error) {
            log('UPLOAD GAGAL: ' + r.error.message, 'fail');
          } else {
            var url = SUPA_URL + '/storage/v1/object/public/gallery/' + fileName;
            log('UPLOAD BERHASIL! URL: ' + url, 'ok');

            // Test save URL to news_data
            var testData = [{ id: 'img-test', title_id: 'Image Test', title_en: '', body_id: '<p>t</p>', body_en: '', date: '2025-01-01', category: 'company', thumbnail: url }];
            var r2 = await sb.from('news_data').upsert({ id: 'main-test', data: testData, updated_at: new Date().toISOString() });
            if (r2.error) {
              log('SAVE URL KE DB GAGAL: ' + r2.error.message, 'fail');
            } else {
              var r3 = await sb.from('news_data').select('*').eq('id', 'main-test').single();
              if (r3.data && r3.data.data[0].thumbnail === url) {
                log('SAVE + READ URL OK! Thumbnail URL tersimpan di DB.', 'ok');
                log('URL thumbnail: ' + url, 'ok');

                // Show image
                var img = document.createElement('img');
                img.src = url; img.style.width = '100px'; img.style.marginTop = '8px';
                document.getElementById('log').appendChild(img);
              } else {
                log('READ BACK GAGAL: ' + JSON.stringify(r3), 'fail');
              }
              // Clean up
              await sb.from('news_data').delete().eq('id', 'main-test');
            }

            // Clean up storage
            await sb.storage.from('gallery').remove([fileName]);
          }
        } catch(e) {
          log('ERROR: ' + e.message, 'fail');
        }
      }, 'image/jpeg', 0.8);
    }
  </script>
</body>
</html>
